<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь Задач</title>
    <!-- Подключаем Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Подключаем React и Babel для обработки JSX в браузере -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#f3f4f6] dark:bg-[#27272a] transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Вспомогательные компоненты иконок (SVG для автономности)
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                chevronLeft: <path d="m15 18-6-6 6-6"/>,
                chevronRight: <path d="m9 18 6-6-6-6"/>,
                plus: <path d="M5 12h14m-7-7v14"/>,
                checkCircle: <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4l-10 10.01L9 11"/>,
                circle: <circle cx="12" cy="12" r="10"/>,
                trash: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 9 2 2 4-4"/>,
                calendar: <path d="M8 2v4m8-4v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"/>,
                sun: <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41m12.73-12.73-1.41 1.41M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"/>,
                moon: <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>,
                list: <path d="M3 12h.01M3 18h.01M3 6h.01M8 12h13M8 18h13M8 6h13"/>
            };
            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width={size} 
                    height={size} 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [tasks, setTasks] = useState({});
            const [activeInput, setActiveInput] = useState(null);
            const [tempTaskText, setTempTaskText] = useState('');
            const [isDarkMode, setIsDarkMode] = useState(
                localStorage.getItem('theme') === 'dark' || 
                (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)
            );

            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }, [isDarkMode]);

            useEffect(() => {
                const savedTasks = localStorage.getItem('calendar_tasks_gh_v1');
                if (savedTasks) {
                    try { setTasks(JSON.parse(savedTasks)); } catch (e) { console.error(e); }
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('calendar_tasks_gh_v1', JSON.stringify(tasks));
            }, [tasks]);

            const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
            const weekDays = ["Вс", "Пн", "Вт", "Ср", "Чт", "Пт", "Сб"];

            const getDaysInMonth = () => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const date = new Date(year, month, 1);
                const days = [];
                while (date.getMonth() === month) {
                    days.push(new Date(date));
                    date.setDate(date.getDate() + 1);
                }
                return days;
            };

            const addTask = (dateKey) => {
                if (!tempTaskText.trim()) { setActiveInput(null); return; }
                const newTask = { id: Date.now(), text: tempTaskText, completed: false };
                setTasks(prev => ({ ...prev, [dateKey]: [...(prev[dateKey] || []), newTask] }));
                setTempTaskText('');
                setActiveInput(null);
            };

            const toggleTask = (dateKey, taskId) => {
                setTasks(prev => ({
                    ...prev,
                    [dateKey]: prev[dateKey].map(t => t.id === taskId ? { ...t, completed: !t.completed } : t)
                }));
            };

            const deleteTask = (dateKey, taskId) => {
                setTasks(prev => ({
                    ...prev,
                    [dateKey]: prev[dateKey].filter(t => t.id !== taskId)
                }));
            };

            const allDays = useMemo(() => getDaysInMonth(), [currentDate]);

            const isToday = (date) => {
                const today = new Date();
                return date.getDate() === today.getDate() && 
                       date.getMonth() === today.getMonth() && 
                       date.getFullYear() === today.getFullYear();
            };

            return (
                <div className="min-h-screen p-4 md:p-8 text-[#111827] dark:text-[#f4f4f5] transition-colors duration-300">
                    <div className="max-w-4xl mx-auto">
                        
                        <header className="sticky top-4 z-20 bg-white dark:bg-[#3f3f46] rounded-2xl shadow-lg border border-[#e5e7eb] dark:border-[#52525b] p-4 mb-8 flex items-center justify-between transition-colors">
                            <div className="flex items-center gap-4">
                                <div className="bg-[#facc15] p-2.5 rounded-xl text-[#18181b]">
                                    <Icon name="calendar" size={24} />
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold tracking-tight leading-none uppercase">{monthNames[currentDate.getMonth()]}</h1>
                                    <span className="text-sm text-[#4b5563] dark:text-[#a1a1aa] font-semibold">{currentDate.getFullYear()}</span>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                <div className="flex items-center gap-1 bg-[#f3f4f6] dark:bg-[#27272a] p-1 rounded-xl">
                                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1))} className="p-2 hover:bg-white dark:hover:bg-[#3f3f46] rounded-lg transition-all"><Icon name="chevronLeft" size={20}/></button>
                                    <button onClick={() => setCurrentDate(new Date())} className="px-4 py-1.5 text-xs font-bold uppercase hover:bg-white dark:hover:bg-[#3f3f46] rounded-lg transition-all">Сегодня</button>
                                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1))} className="p-2 hover:bg-white dark:hover:bg-[#3f3f46] rounded-lg transition-all"><Icon name="chevronRight" size={20}/></button>
                                </div>
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2.5 bg-[#f3f4f6] dark:bg-[#27272a] rounded-xl text-[#facc15] hover:brightness-90 transition-all border border-transparent dark:border-[#52525b]">
                                    {isDarkMode ? <Icon name="sun" size={20}/> : <Icon name="moon" size={20}/>}
                                </button>
                            </div>
                        </header>

                        <div className="space-y-6">
                            {allDays.map((date) => {
                                const dayNum = date.getDate();
                                const dayName = weekDays[date.getDay()];
                                const dateKey = `${date.getFullYear()}-${date.getMonth()}-${dayNum}`;
                                const dayTasks = tasks[dateKey] || [];
                                const today = isToday(date);
                                const isWeekend = date.getDay() === 0 || date.getDay() === 6;

                                return (
                                    <div key={dateKey} className={`flex flex-col md:flex-row gap-6 p-6 rounded-2xl border transition-all duration-300 ${today ? 'bg-white dark:bg-[#3f3f46] border-[#facc15] ring-1 ring-[#facc15] shadow-xl shadow-yellow-400/10' : 'bg-white dark:bg-[#3f3f46] border-[#e5e7eb] dark:border-[#52525b] shadow-sm'}`}>
                                        <div className="flex md:flex-col items-center md:items-start justify-between md:justify-start gap-1 md:w-24 flex-shrink-0">
                                            <div className="flex flex-col">
                                                <span className={`text-4xl font-black leading-none ${today ? 'text-[#facc15]' : 'text-[#111827] dark:text-[#f4f4f5]'}`}>{dayNum}</span>
                                                <span className={`text-xs font-bold uppercase tracking-widest mt-1 ${isWeekend ? 'text-rose-500' : 'text-[#4b5563] dark:text-[#a1a1aa]'}`}>{dayName}</span>
                                            </div>
                                            {today && <span className="bg-[#facc15] text-[#18181b] text-[10px] px-2 py-1 rounded-md font-black uppercase tracking-tighter">Текущий</span>}
                                        </div>

                                        <div className="flex-1">
                                            <div className="flex items-center gap-2 mb-4">
                                                <Icon name="list" size={14} className="text-[#facc15]" />
                                                <h3 className="text-[10px] font-black text-[#4b5563] dark:text-[#a1a1aa] uppercase tracking-[0.2em]">Запланировано: {dayTasks.length}</h3>
                                            </div>

                                            <div className="space-y-3 mb-4">
                                                {dayTasks.map((task) => (
                                                    <div key={task.id} className={`group flex items-center gap-3 p-4 rounded-xl border transition-all ${task.completed ? 'bg-emerald-500/5 dark:bg-emerald-500/10 border-emerald-500/20 opacity-60' : 'bg-[#f3f4f6] dark:bg-[#27272a] border-[#e5e7eb] dark:border-[#52525b] hover:border-[#facc15]'}`}>
                                                        <button onClick={() => toggleTask(dateKey, task.id)} className={`transition-all transform hover:scale-110 ${task.completed ? 'text-emerald-500' : 'text-[#a1a1aa] hover:text-[#facc15]'}`}>
                                                            <Icon name={task.completed ? "checkCircle" : "circle"} size={22} />
                                                        </button>
                                                        <span className={`flex-1 text-sm font-semibold tracking-tight ${task.completed ? 'text-[#4b5563] dark:text-[#a1a1aa] line-through' : 'text-[#111827] dark:text-[#f4f4f5]'}`}>{task.text}</span>
                                                        <button onClick={() => deleteTask(dateKey, task.id)} className="md:opacity-0 group-hover:opacity-100 p-2 text-[#4b5563] dark:text-[#a1a1aa] hover:text-rose-500 transition-all"><Icon name="trash" size={18} /></button>
                                                    </div>
                                                ))}
                                            </div>

                                            {activeInput === dateKey ? (
                                                <div className="flex gap-2 animate-in">
                                                    <input autoFocus type="text" value={tempTaskText} onChange={(e) => setTempTaskText(e.target.value)} onBlur={() => { if (!tempTaskText.trim()) setActiveInput(null); }} onKeyDown={(e) => { if (e.key === 'Enter') addTask(dateKey); if (e.key === 'Escape') setActiveInput(null); }} placeholder="Введите задачу..." className="flex-1 bg-white dark:bg-[#3f3f46] border border-[#facc15] rounded-xl px-4 py-3 text-sm font-medium shadow-inner outline-none focus:ring-4 focus:ring-yellow-400/20 transition-all text-[#111827] dark:text-[#f4f4f5]" />
                                                    <button onMouseDown={(e) => e.preventDefault()} onClick={() => addTask(dateKey)} className="bg-[#facc15] text-[#18181b] px-6 py-3 rounded-xl text-sm font-black uppercase tracking-wider shadow-lg shadow-yellow-400/20">ОК</button>
                                                </div>
                                            ) : (
                                                <button onClick={() => setActiveInput(dateKey)} className="group flex items-center gap-3 w-full p-4 rounded-xl border-2 border-dashed border-[#e5e7eb] dark:border-[#52525b] hover:border-[#facc15] hover:bg-yellow-400/5 text-[#4b5563] dark:text-[#a1a1aa] hover:text-[#facc15] transition-all text-xs font-bold uppercase tracking-widest">
                                                    <Icon name="plus" size={18} className="group-hover:rotate-90 transition-transform duration-300" />
                                                    Новая задача
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                    <footer className="mt-16 text-center border-t border-[#e5e7eb] dark:border-[#52525b] pt-8 pb-12">
                        <p className="text-[10px] font-black text-[#4b5563] dark:text-[#a1a1aa] uppercase tracking-[0.4em]">Calendar Tasks System • 2024</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
