<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь Задач</title>
    
    <!-- Иконка для вкладки браузера (Favicon) -->
    <link rel="icon" type="image/jpeg" href="logo4c.jpg">
    <!-- Иконка для сохранения на экран смартфона (Apple/Android) -->
    <link rel="apple-touch-icon" href="logo4c.jpg">

    <!-- Подключаем Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Подключаем React и Babel для обработки JSX в браузере -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Стили для лоадера синхронизации */
        .sync-spin { animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        /* Стили для поля времени */
        input[type="time"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(0.5) sepia(1) saturate(5) hue-rotate(10deg);
        }
        .dark input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(0.8) sepia(1) saturate(5) hue-rotate(10deg);
        }
    </style>
</head>
<body class="bg-[#f3f4f6] dark:bg-[#27272a] transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithCustomToken, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // === НАСТРОЙКА FIREBASE ===
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            firebaseConfig = {
                apiKey: "AIzaSyDDqvS-Qg938Yu6jlSAnM2NFlK5lb_rzhI", 
                authDomain: "zadachi-b507e.firebaseapp.com",
                projectId: "zadachi-b507e",
                storageBucket: "zadachi-b507e.appspot.com",
                messagingSenderId: "984202830628",
                appId: "1:984202830628:web:887343533e3c82c1df49b1"
            };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'zadachi-b507e';

        const { useState, useEffect, useMemo } = React;

        // Вспомогательные компоненты иконок
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                chevronLeft: <path d="m15 18-6-6 6-6"/>,
                chevronRight: <path d="m9 18 6-6-6-6"/>,
                plus: <path d="M5 12h14m-7-7v14"/>,
                checkCircle: <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4l-10 10.01L9 11"/>,
                circle: <circle cx="12" cy="12" r="10"/>,
                trash: <path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 9 2 2 4-4"/>,
                calendar: <path d="M8 2v4m8-4v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"/>,
                sun: <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41m12.73-12.73-1.41 1.41M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"/>,
                moon: <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>,
                list: <path d="M3 12h.01M3 18h.01M3 6h.01M8 12h13M8 18h13M8 6h13"/>,
                cloud: <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>,
                logout: <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4m7 14 5-5-5-5m5 5H9"/>,
                edit: <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>,
                // Исправленные иконки: множественные элементы завернуты в тег <g>
                clock: <g><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></g>,
                bell: <g><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></g>,
                bellOff: <g><path d="M13.73 21a2 2 0 0 1-3.46 0"/><path d="M18.63 13A17.89 17.89 0 0 1 18 8"/><path d="M6.26 6.26A5.86 5.86 0 0 0 6 8c0 7-3 9-3 9h14"/><path d="M18 8a6 6 0 0 0-9.33-5"/><line x1="1" y1="1" x2="23" y2="23"/></g>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [tasks, setTasks] = useState({});
            
            // Состояния добавления задачи
            const [activeInput, setActiveInput] = useState(null);
            const [tempTaskText, setTempTaskText] = useState('');
            const [tempTaskTime, setTempTaskTime] = useState('');
            
            // Состояния редактирования задачи
            const [editingTaskId, setEditingTaskId] = useState(null);
            const [editTaskText, setEditTaskText] = useState('');
            const [editTaskTime, setEditTaskTime] = useState('');
            
            // Состояния Авторизации
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [loginError, setLoginError] = useState('');
            
            const [isSyncing, setIsSyncing] = useState(false);
            const [initialScrollDone, setInitialScrollDone] = useState(false);
            
            // Статус уведомлений
            const [notificationsPermitted, setNotificationsPermitted] = useState(
                'Notification' in window && Notification.permission === 'granted'
            );
            
            const [isDarkMode, setIsDarkMode] = useState(
                localStorage.getItem('theme') === 'dark' || 
                (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)
            );

            // Тема
            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }, [isDarkMode]);

            // Запрос разрешений на уведомления
            const requestNotificationPermission = async () => {
                if (!('Notification' in window)) {
                    alert('Ваш браузер не поддерживает уведомления');
                    return;
                }
                const permission = await Notification.requestPermission();
                setNotificationsPermitted(permission === 'granted');
                if (permission !== 'granted') {
                    alert('Вы запретили уведомления. Разрешите их в настройках сайта в браузере.');
                }
            };

            // Инициализация аутентификации
            useEffect(() => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    signInWithCustomToken(auth, __initial_auth_token).catch(console.error);
                }

                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // Загрузка данных из Firestore
            useEffect(() => {
                if (!user) return;
                setIsSyncing(true);

                const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'calendar', 'tasks');

                const unsubscribe = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const dataString = docSnap.data().data;
                        if (dataString) {
                            try {
                                setTasks(JSON.parse(dataString));
                            } catch (e) { console.error("Ошибка парсинга", e); }
                        }
                    }
                    setIsSyncing(false);
                }, (err) => {
                    console.error("Ошибка загрузки данных:", err);
                    setIsSyncing(false);
                });

                return () => unsubscribe();
            }, [user]);

            // Цикл проверки уведомлений (каждые 10 секунд)
            useEffect(() => {
                if (!user || !notificationsPermitted || Object.keys(tasks).length === 0) return;

                const interval = setInterval(() => {
                    const now = new Date();
                    const todayKey = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
                    const todayTasks = tasks[todayKey] || [];
                    
                    let needsUpdate = false;
                    const updatedTasks = todayTasks.map(task => {
                        if (task.time && !task.completed && !task.notified) {
                            const [hours, minutes] = task.time.split(':');
                            if (now.getHours() === parseInt(hours) && now.getMinutes() === parseInt(minutes)) {
                                // Показываем уведомление
                                new Notification("Календарь: Напоминание", {
                                    body: task.text,
                                    icon: "logo4c.jpg",
                                    requireInteraction: true // Оставлять на экране до клика (на поддерживаемых ОС)
                                });
                                needsUpdate = true;
                                return { ...task, notified: true };
                            }
                        }
                        return task;
                    });

                    if (needsUpdate) {
                        const newTasksList = { ...tasks, [todayKey]: updatedTasks };
                        setTasks(newTasksList);
                        // Тихо обновляем в фоне, не вызывая спиннер синхронизации, чтобы не моргало
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'calendar', 'tasks');
                        setDoc(docRef, { data: JSON.stringify(newTasksList) }).catch(console.error);
                    }

                }, 10000); // 10 секунд

                return () => clearInterval(interval);
            }, [tasks, user, notificationsPermitted]);

            const monthNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
            const weekDays = ["Вс", "Пн", "Вт", "Ср", "Чт", "Пт", "Сб"];

            const getDaysInMonth = () => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const date = new Date(year, month, 1);
                const days = [];
                while (date.getMonth() === month) {
                    days.push(new Date(date));
                    date.setDate(date.getDate() + 1);
                }
                return days;
            };

            // Сохранение в Firebase
            const updateTasksInCloud = async (newTasks) => {
                setTasks(newTasks); // Мгновенное обновление UI
                if (!user) return;
                
                setIsSyncing(true);
                try {
                    const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'calendar', 'tasks');
                    await setDoc(docRef, { data: JSON.stringify(newTasks) });
                } catch (error) {
                    console.error("Ошибка сохранения задач:", error);
                } finally {
                    setIsSyncing(false);
                }
            };

            const handleGoogleLogin = async () => {
                setLoginError('');
                const provider = new GoogleAuthProvider();
                try {
                    await signInWithPopup(auth, provider);
                } catch (error) {
                    console.error("Ошибка входа:", error);
                    setLoginError('Ошибка авторизации. Убедитесь, что ваш домен добавлен в настройки Firebase.');
                }
            };

            const addTask = (dateKey) => {
                if (!tempTaskText.trim()) { 
                    setActiveInput(null); 
                    setTempTaskTime('');
                    return; 
                }
                const newTask = { 
                    id: Date.now(), 
                    text: tempTaskText, 
                    completed: false,
                    time: tempTaskTime || null,
                    notified: false // Флаг, чтобы не показывать уведомление дважды
                };
                
                const newTasks = { ...tasks, [dateKey]: [...(tasks[dateKey] || []), newTask] };
                updateTasksInCloud(newTasks);
                
                setTempTaskText('');
                setTempTaskTime('');
                setActiveInput(null);
                
                // Если добавили время, но нет прав на уведомления - запрашиваем
                if (tempTaskTime && !notificationsPermitted) {
                    requestNotificationPermission();
                }
            };

            const startEdit = (task) => {
                setEditingTaskId(task.id);
                setEditTaskText(task.text);
                setEditTaskTime(task.time || '');
            };

            const saveEdit = (dateKey, taskId) => {
                if (!editTaskText.trim()) {
                    setEditingTaskId(null);
                    return;
                }
                const newTasks = {
                    ...tasks,
                    [dateKey]: tasks[dateKey].map(t => 
                        t.id === taskId ? { 
                            ...t, 
                            text: editTaskText, 
                            time: editTaskTime || null,
                            notified: (t.time !== editTaskTime) ? false : t.notified // Сбрасываем флаг, если время изменилось
                        } : t
                    )
                };
                updateTasksInCloud(newTasks);
                setEditingTaskId(null);
                
                if (editTaskTime && !notificationsPermitted) {
                    requestNotificationPermission();
                }
            };

            const cancelEdit = () => {
                setEditingTaskId(null);
                setEditTaskText('');
                setEditTaskTime('');
            };

            const toggleTask = (dateKey, taskId) => {
                const newTasks = {
                    ...tasks,
                    [dateKey]: tasks[dateKey].map(t => t.id === taskId ? { ...t, completed: !t.completed } : t)
                };
                updateTasksInCloud(newTasks);
            };

            const deleteTask = (dateKey, taskId) => {
                const newTasks = {
                    ...tasks,
                    [dateKey]: tasks[dateKey].filter(t => t.id !== taskId)
                };
                updateTasksInCloud(newTasks);
            };

            const allDays = useMemo(() => getDaysInMonth(), [currentDate]);

            const isToday = (date) => {
                const today = new Date();
                return date.getDate() === today.getDate() && 
                       date.getMonth() === today.getMonth() && 
                       date.getFullYear() === today.getFullYear();
            };

            const handleGoToToday = () => {
                setCurrentDate(new Date());
                setTimeout(() => {
                    const todayElement = document.getElementById('today-card');
                    if (todayElement) {
                        todayElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 100);
            };

            // Автоматический скролл к текущему дню
            useEffect(() => {
                if (user && !isSyncing && !initialScrollDone) {
                    const timer = setTimeout(() => {
                        const todayElement = document.getElementById('today-card');
                        if (todayElement) {
                            todayElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                        setInitialScrollDone(true);
                    }, 400); 
                    return () => clearTimeout(timer);
                }
            }, [user, isSyncing, initialScrollDone]);

            // ЭКРАН ЗАГРУЗКИ АВТОРИЗАЦИИ
            if (authLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#f3f4f6] dark:bg-[#27272a] text-[#111827] dark:text-[#f4f4f5]">
                        <Icon name="cloud" size={32} className="sync-spin text-[#facc15]" />
                    </div>
                );
            }

            // ЭКРАН ВХОДА
            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#f3f4f6] dark:bg-[#27272a] p-4 transition-colors duration-300">
                        <div className="bg-white dark:bg-[#3f3f46] p-8 sm:p-10 rounded-3xl shadow-xl max-w-sm w-full text-center border border-[#e5e7eb] dark:border-[#52525b] animate-in">
                            <div className="bg-[#facc15] w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-yellow-400/20">
                                <Icon name="calendar" size={32} className="text-[#18181b]" />
                            </div>
                            <h1 className="text-2xl font-black uppercase tracking-tight text-[#111827] dark:text-[#f4f4f5] mb-2">Календарь Задач</h1>
                            <p className="text-sm text-[#4b5563] dark:text-[#a1a1aa] mb-8 font-medium">Войдите через Google, чтобы синхронизировать данные</p>
                            
                            {loginError && (
                                <div className="mb-6 p-3 bg-rose-500/10 border border-rose-500/20 rounded-xl text-rose-500 text-xs font-bold">
                                    {loginError}
                                </div>
                            )}

                            <button 
                                onClick={handleGoogleLogin}
                                className="w-full flex items-center justify-center gap-3 bg-white dark:bg-[#27272a] text-[#111827] dark:text-[#f4f4f5] border-2 border-[#e5e7eb] dark:border-[#52525b] hover:border-[#facc15] dark:hover:border-[#facc15] hover:bg-yellow-400/5 px-6 py-3.5 rounded-xl text-sm font-bold transition-all shadow-sm"
                            >
                                <svg className="w-5 h-5" viewBox="0 0 24 24">
                                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                </svg>
                                Войти через Google
                            </button>
                        </div>
                    </div>
                );
            }

            // ГЛАВНЫЙ ЭКРАН ПРИЛОЖЕНИЯ
            return (
                <div className="min-h-screen p-2 sm:p-4 md:p-8 text-[#111827] dark:text-[#f4f4f5] transition-colors duration-300">
                    <div className="max-w-4xl mx-auto">
                        
                        <header className="sticky top-2 sm:top-4 z-20 bg-white dark:bg-[#3f3f46] rounded-2xl shadow-lg border border-[#e5e7eb] dark:border-[#52525b] p-3 sm:p-4 mb-6 sm:mb-8 flex flex-col sm:flex-row sm:items-center justify-between gap-4 transition-colors">
                            <div className="flex items-center justify-between w-full sm:w-auto">
                                <div className="flex items-center gap-3 sm:gap-4">
                                    <div className="bg-[#facc15] p-2 sm:p-2.5 rounded-xl text-[#18181b] relative">
                                        <Icon name="calendar" size={24} />
                                        {isSyncing && (
                                            <div className="absolute -top-1 -right-1 bg-emerald-500 rounded-full p-0.5 shadow-sm">
                                                <Icon name="cloud" size={10} className="text-white sync-spin" />
                                            </div>
                                        )}
                                    </div>
                                    <div>
                                        <h1 className="text-lg sm:text-xl font-bold tracking-tight leading-none uppercase">{monthNames[currentDate.getMonth()]}</h1>
                                        <span className="text-xs sm:text-sm text-[#4b5563] dark:text-[#a1a1aa] font-semibold">{currentDate.getFullYear()}</span>
                                    </div>
                                </div>
                                <div className="flex sm:hidden items-center">
                                    {user?.photoURL && <img src={user.photoURL} alt="Профиль" className="w-9 h-9 rounded-full border-2 border-[#facc15] shadow-sm" />}
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-2 sm:gap-3 w-full sm:w-auto">
                                <div className="hidden sm:flex items-center mr-2">
                                    {user?.photoURL && <img src={user.photoURL} alt="Профиль" className="w-9 h-9 rounded-full border-2 border-[#facc15] shadow-sm" />}
                                </div>

                                <div className="flex items-center gap-1 bg-[#f3f4f6] dark:bg-[#27272a] p-1 rounded-xl w-full sm:w-auto justify-between sm:justify-start">
                                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1))} className="p-2 sm:p-2 hover:bg-white dark:hover:bg-[#3f3f46] rounded-lg transition-all flex-1 sm:flex-none flex justify-center"><Icon name="chevronLeft" size={20}/></button>
                                    <button onClick={handleGoToToday} className="px-3 sm:px-4 py-1.5 text-xs font-bold uppercase hover:bg-white dark:hover:bg-[#3f3f46] rounded-lg transition-all flex-1 sm:flex-none text-center">Сегодня</button>
                                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1))} className="p-2 sm:p-2 hover:bg-white dark:hover:bg-[#3f3f46] rounded-lg transition-all flex-1 sm:flex-none flex justify-center"><Icon name="chevronRight" size={20}/></button>
                                </div>
                                
                                <div className="flex items-center gap-2">
                                    <button onClick={requestNotificationPermission} className={`p-2.5 bg-[#f3f4f6] dark:bg-[#27272a] rounded-xl transition-all border border-transparent dark:border-[#52525b] ${notificationsPermitted ? 'text-emerald-500 hover:brightness-90' : 'text-rose-400 hover:text-rose-500'}`} title={notificationsPermitted ? "Уведомления включены" : "Включить уведомления"}>
                                        <Icon name={notificationsPermitted ? "bell" : "bellOff"} size={20}/>
                                    </button>
                                    <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2.5 bg-[#f3f4f6] dark:bg-[#27272a] rounded-xl text-[#facc15] hover:brightness-90 transition-all border border-transparent dark:border-[#52525b]" title="Сменить тему">
                                        {isDarkMode ? <Icon name="sun" size={20}/> : <Icon name="moon" size={20}/>}
                                    </button>
                                    <button onClick={() => signOut(auth)} className="hidden sm:block p-2.5 bg-[#f3f4f6] dark:bg-[#27272a] rounded-xl text-rose-500 hover:brightness-90 transition-all border border-transparent dark:border-[#52525b]" title="Выйти">
                                        <Icon name="logout" size={20}/>
                                    </button>
                                </div>
                            </div>
                        </header>

                        <div className="space-y-4 sm:space-y-6">
                            {allDays.map((date) => {
                                const dayNum = date.getDate();
                                const dayName = weekDays[date.getDay()];
                                const dateKey = `${date.getFullYear()}-${date.getMonth()}-${dayNum}`;
                                const dayTasks = tasks[dateKey] || [];
                                const today = isToday(date);
                                const isWeekend = date.getDay() === 0 || date.getDay() === 6;

                                return (
                                    <div key={dateKey} id={today ? 'today-card' : `day-${dateKey}`} className={`flex flex-col md:flex-row gap-4 sm:gap-6 p-4 sm:p-6 rounded-2xl border transition-all duration-300 ${today ? 'bg-white dark:bg-[#3f3f46] border-[#facc15] ring-1 ring-[#facc15] shadow-xl shadow-yellow-400/10' : 'bg-white dark:bg-[#3f3f46] border-[#e5e7eb] dark:border-[#52525b] shadow-sm'}`}>
                                        <div className="flex flex-row md:flex-col items-center md:items-start justify-between md:justify-start gap-2 md:w-24 flex-shrink-0 border-b md:border-b-0 border-[#e5e7eb] dark:border-[#52525b] pb-3 md:pb-0">
                                            <div className="flex flex-row md:flex-col items-baseline md:items-start gap-2 md:gap-0">
                                                <span className={`text-3xl md:text-4xl font-black leading-none ${today ? 'text-[#facc15]' : 'text-[#111827] dark:text-[#f4f4f5]'}`}>{dayNum}</span>
                                                <span className={`text-[10px] md:text-xs font-bold uppercase tracking-widest mt-0 md:mt-1 ${isWeekend ? 'text-rose-500' : 'text-[#4b5563] dark:text-[#a1a1aa]'}`}>{dayName}</span>
                                            </div>
                                            {today && <span className="bg-[#facc15] text-[#18181b] text-[10px] px-2 py-1 rounded-md font-black uppercase tracking-tighter">Текущий</span>}
                                        </div>

                                        <div className="flex-1">
                                            <div className="flex items-center gap-2 mb-3 sm:mb-4">
                                                <Icon name="list" size={14} className="text-[#facc15]" />
                                                <h3 className="text-[10px] font-black text-[#4b5563] dark:text-[#a1a1aa] uppercase tracking-[0.2em]">Запланировано: {dayTasks.length}</h3>
                                            </div>

                                            <div className="space-y-2 sm:space-y-3 mb-3 sm:mb-4">
                                                {dayTasks.map((task) => (
                                                    <div key={task.id} className={`group flex items-center gap-2 sm:gap-3 p-3 sm:p-4 rounded-xl border transition-all ${task.completed ? 'bg-emerald-500/5 dark:bg-emerald-500/10 border-emerald-500/20 opacity-60' : 'bg-[#f3f4f6] dark:bg-[#27272a] border-[#e5e7eb] dark:border-[#52525b] hover:border-[#facc15]'}`}>
                                                        <button onClick={() => toggleTask(dateKey, task.id)} className={`transition-all transform hover:scale-110 p-1 sm:p-0 ${task.completed ? 'text-emerald-500' : 'text-[#a1a1aa] hover:text-[#facc15]'}`}>
                                                            <Icon name={task.completed ? "checkCircle" : "circle"} size={22} />
                                                        </button>

                                                        {editingTaskId === task.id ? (
                                                            <div className="flex-1 flex flex-col sm:flex-row gap-2">
                                                                <input 
                                                                    autoFocus
                                                                    type="text" 
                                                                    value={editTaskText}
                                                                    onChange={(e) => setEditTaskText(e.target.value)}
                                                                    onKeyDown={(e) => {
                                                                        if (e.key === 'Enter') saveEdit(dateKey, task.id);
                                                                        if (e.key === 'Escape') cancelEdit();
                                                                    }}
                                                                    className="flex-1 bg-white dark:bg-[#3f3f46] border border-[#facc15] rounded px-3 py-1.5 text-sm font-semibold outline-none focus:ring-2 focus:ring-yellow-400/20 transition-all text-[#111827] dark:text-[#f4f4f5]"
                                                                />
                                                                <input 
                                                                    type="time" 
                                                                    value={editTaskTime}
                                                                    onChange={(e) => setEditTaskTime(e.target.value)}
                                                                    className="bg-white dark:bg-[#3f3f46] border border-[#facc15] rounded px-2 py-1.5 text-sm font-semibold outline-none focus:ring-2 focus:ring-yellow-400/20 transition-all text-[#111827] dark:text-[#f4f4f5]"
                                                                />
                                                                <button onClick={() => saveEdit(dateKey, task.id)} className="bg-[#facc15] text-[#18181b] px-3 py-1.5 rounded text-xs font-bold shadow-md">ОК</button>
                                                            </div>
                                                        ) : (
                                                            <div onDoubleClick={() => startEdit(task)} className="flex-1 flex flex-col sm:flex-row sm:items-center justify-between cursor-pointer gap-1 sm:gap-4" title="Дважды кликните, чтобы редактировать">
                                                                <span className={`text-sm font-semibold tracking-tight leading-snug ${task.completed ? 'text-[#4b5563] dark:text-[#a1a1aa] line-through' : 'text-[#111827] dark:text-[#f4f4f5]'}`}>
                                                                    {task.text}
                                                                </span>
                                                                {task.time && (
                                                                    <span className={`inline-flex items-center gap-1 text-[11px] font-bold px-2 py-1 rounded-md ${task.completed ? 'bg-emerald-500/10 text-emerald-600 dark:text-emerald-400' : 'bg-yellow-400/20 text-yellow-700 dark:text-yellow-400'}`}>
                                                                        <Icon name="clock" size={12} /> {task.time}
                                                                    </span>
                                                                )}
                                                            </div>
                                                        )}

                                                        {editingTaskId !== task.id && (
                                                            <button onClick={() => startEdit(task)} className="md:opacity-0 group-hover:opacity-100 p-2 text-[#4b5563] dark:text-[#a1a1aa] hover:text-[#facc15] transition-all" title="Редактировать">
                                                                <Icon name="edit" size={18} />
                                                            </button>
                                                        )}

                                                        <button onClick={() => deleteTask(dateKey, task.id)} className="md:opacity-0 group-hover:opacity-100 p-2 text-[#4b5563] dark:text-[#a1a1aa] hover:text-rose-500 transition-all" title="Удалить">
                                                            <Icon name="trash" size={18} />
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>

                                            {activeInput === dateKey ? (
                                                <div className="flex gap-2 animate-in flex-col sm:flex-row">
                                                    <input autoFocus type="text" value={tempTaskText} onChange={(e) => setTempTaskText(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') addTask(dateKey); if (e.key === 'Escape') { setActiveInput(null); setTempTaskTime(''); } }} placeholder="Введите задачу..." className="flex-1 bg-white dark:bg-[#3f3f46] border border-[#facc15] rounded-xl px-4 py-3 text-sm font-medium shadow-inner outline-none focus:ring-4 focus:ring-yellow-400/20 transition-all text-[#111827] dark:text-[#f4f4f5]" />
                                                    <div className="flex gap-2 w-full sm:w-auto">
                                                        <input type="time" value={tempTaskTime} onChange={(e) => setTempTaskTime(e.target.value)} title="Время напоминания" className="bg-white dark:bg-[#3f3f46] border border-[#facc15] rounded-xl px-3 py-3 text-sm font-medium shadow-inner outline-none focus:ring-4 focus:ring-yellow-400/20 transition-all text-[#111827] dark:text-[#f4f4f5] flex-1 sm:flex-none" />
                                                        <button onMouseDown={(e) => e.preventDefault()} onClick={() => addTask(dateKey)} className="bg-[#facc15] text-[#18181b] px-6 py-3 rounded-xl text-sm font-black uppercase tracking-wider shadow-lg shadow-yellow-400/20 flex-1 sm:flex-none">ОК</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <button onClick={() => setActiveInput(dateKey)} className="group flex items-center justify-center sm:justify-start gap-3 w-full p-3 sm:p-4 rounded-xl border-2 border-dashed border-[#e5e7eb] dark:border-[#52525b] hover:border-[#facc15] hover:bg-yellow-400/5 text-[#4b5563] dark:text-[#a1a1aa] hover:text-[#facc15] transition-all text-xs font-bold uppercase tracking-widest">
                                                    <Icon name="plus" size={18} className="group-hover:rotate-90 transition-transform duration-300" />
                                                    Новая задача
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                    <footer className="mt-12 sm:mt-16 text-center border-t border-[#e5e7eb] dark:border-[#52525b] pt-6 sm:pt-8 pb-8 sm:pb-12 flex flex-col items-center justify-center gap-2">
                        <button onClick={() => signOut(auth)} className="sm:hidden mb-4 bg-rose-500/10 text-rose-500 border border-rose-500/20 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider">Выйти из аккаунта</button>
                        <p className="text-[10px] font-black text-[#4b5563] dark:text-[#a1a1aa] uppercase tracking-[0.4em]">Calendar Tasks System • 2024</p>
                        <p className="text-xs text-[#a1a1aa] flex items-center gap-1">
                            {user?.email && <span className="mr-2 hidden sm:inline">{user.email}</span>}
                            Статус: {isSyncing ? <span className="text-yellow-500 flex items-center gap-1"><Icon name="cloud" size={14} className="sync-spin" /> Синхронизация...</span> : <span className="text-emerald-500 flex items-center gap-1"><Icon name="checkCircle" size={14} /> В сети</span>}
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
